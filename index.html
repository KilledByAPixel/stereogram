<!DOCTYPE html>
<html>
<head>
<meta charset=utf-8>
<title>Stereogram Generator</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; font-family: system-ui, -apple-system, sans-serif; background: #1a1a1a; color: #ccc; }

.app {
    display: flex;
    height: 100vh;
    overflow: hidden;
}

/* Sidebar */
.sidebar {
    width: 280px;
    min-width: 280px;
    background: #242424;
    border-right: 1px solid #333;
    overflow-y: auto;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 12px;
}
.sidebar h1 {
    font-size: 16px;
    color: #eee;
    margin-bottom: 4px;
}
.sidebar h2 {
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: #888;
    margin-top: 8px;
}
.control-group {
    display: flex;
    flex-direction: column;
    gap: 2px;
}
.control-group label {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 13px;
    color: #bbb;
}
.control-group label span.value {
    font-family: monospace;
    font-size: 12px;
    color: #999;
    min-width: 40px;
    text-align: right;
}
.control-group input[type="range"] {
    width: 100%;
    height: 6px;
    -webkit-appearance: none;
    appearance: none;
    background: #444;
    border-radius: 3px;
    outline: none;
    cursor: pointer;
}
.control-group input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 14px;
    height: 14px;
    border-radius: 50%;
    background: #7af;
    cursor: pointer;
}
.checkbox-group {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 13px;
    color: #bbb;
    cursor: pointer;
}
.checkbox-group input { cursor: pointer; }

.control-group.disabled {
    opacity: 0.4;
    pointer-events: none;
}

select, button {
    width: 100%;
    padding: 8px 10px;
    background: #333;
    color: #ccc;
    border: 1px solid #555;
    border-radius: 4px;
    font-size: 13px;
    cursor: pointer;
}
select:hover, button:hover { border-color: #7af; }
button { background: #2a3a4a; }
button:hover { background: #3a4a5a; }

.file-input-wrapper {
    position: relative;
}
.file-input-wrapper input[type="file"] {
    position: absolute;
    inset: 0;
    opacity: 0;
    cursor: pointer;
}

.separator { border-top: 1px solid #333; margin: 4px 0; }

/* Canvas area */
.canvas-area {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
    padding: 20px;
}
.canvas-wrapper {
    position: relative;
    max-width: 100%;
    max-height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
}
#mainCanvas, #depthCanvas {
    max-width: 100%;
    max-height: calc(100vh - 80px);
    box-shadow: 0 0 40px 10px #000;
    object-fit: contain;
}
#depthCanvas {
    position: absolute;
    display: none;
}
.drop-overlay {
    position: absolute;
    inset: 0;
    background: rgba(100, 170, 255, 0.15);
    border: 3px dashed #7af;
    border-radius: 8px;
    display: none;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    color: #7af;
    pointer-events: none;
    z-index: 10;
}
.drop-overlay.active { display: flex; }

.progress-bar {
    width: 100%;
    max-width: 600px;
    height: 4px;
    background: #333;
    border-radius: 2px;
    margin-top: 12px;
    overflow: hidden;
}
.progress-bar .fill {
    height: 100%;
    background: #7af;
    width: 0%;
    transition: width 0.1s;
}
.progress-text {
    font-size: 12px;
    color: #666;
    margin-top: 4px;
}

/* Responsive */
@media (max-width: 768px) {
    .app { flex-direction: column; }
    .sidebar {
        width: 100%;
        min-width: unset;
        max-height: 40vh;
        border-right: none;
        border-bottom: 1px solid #333;
    }
}
</style>
</head>
<body>
<div class="app">
    <div class="sidebar">
        <h1>Stereogram Generator</h1>

        <h2>Depth Image</h2>
        <div class="control-group">
            <label>Preset</label>
            <select id="presetSelect">
                <option value="images/test1.png">Box Frame</option>
                <option value="images/test2.png">Sphere</option>
                <option value="images/test3.png">Ring</option>
                <option value="images/test4.png">Pyramid</option>
                <option value="images/test5.png">Waves</option>
                <option value="text">3D Text</option>
            </select>
        </div>
        <div class="control-group" id="textGroup" style="display:none">
            <label>Text</label>
            <input type="text" id="textInput" value="HELLO" style="width:100%;padding:8px 10px;background:#333;color:#ccc;border:1px solid #555;border-radius:4px;font-size:13px">
        </div>
        <div class="control-group" id="fontGroup" style="display:none">
            <label>Font</label>
            <select id="fontSelect">
                <option value="Arial Black, sans-serif">Arial Black</option>
                <option value="Arial, sans-serif">Arial</option>
                <option value="Impact, sans-serif">Impact</option>
                <option value="Verdana, sans-serif">Verdana</option>
                <option value="Georgia, serif">Georgia</option>
                <option value="Times New Roman, serif">Times New Roman</option>
                <option value="Comic Sans MS, cursive">Comic Sans</option>
            </select>
        </div>
        <div class="control-group file-input-wrapper">
            <button id="fileBtn">Upload Depth Map...</button>
            <input type="file" id="fileInput" accept="image/*">
        </div>

        <div class="separator"></div>
        <h2>Stereogram</h2>

        <div class="control-group">
            <label>Depth Intensity <span class="value" id="depthVal">0.2</span></label>
            <input type="range" id="depthSlider" min="0" max="1.0" step="0.01" value="0.3">
        </div>
        <button id="autoDepthBtn">Auto Depth</button>
        <div class="control-group">
            <label>Repeat Count <span class="value" id="repeatVal">14</span></label>
            <input type="range" id="repeatSlider" min="8" max="30" step="1" value="14">
        </div>
        <label class="checkbox-group">
            <input type="checkbox" id="invertCheck"> Invert Depth
        </label>
        <label class="checkbox-group">
            <input type="checkbox" id="showHeightCheck"> Show Depth Map
        </label>
        <label class="checkbox-group">
            <input type="checkbox" id="dotsCheck"> Convergence Dots
        </label>
        <label class="checkbox-group">
            <input type="checkbox" id="edgeCheck"> Edge Enhancement
        </label>
        <div class="control-group" id="edgeGroup" style="display:none">
            <label>Edge Strength <span class="value" id="edgeVal">0.50</span></label>
            <input type="range" id="edgeSlider" min="0.05" max="1" step="0.05" value="0.5">
        </div>

        <div class="separator"></div>
        <h2>Pattern</h2>

        <div class="control-group">
            <label>Style</label>
            <select id="patternSelect">
                <option value="gradient">Gradient Noise</option>
                <option value="warped">Warped Noise</option>
                <option value="pixelated">Pixelated Noise</option>
                <option value="dots">Random Dots</option>
                <option value="checkerboard">Checkerboard</option>
                <option value="custom">Custom Image</option>
            </select>
        </div>
        <div class="control-group" id="scaleGroup">
            <label>Texture Scale <span class="value" id="scaleVal">10.0</span></label>
            <input type="range" id="scaleSlider" min="1" max="30" step="0.5" value="10">
        </div>
        <div class="control-group" id="hueVarGroup">
            <label>Hue Variance <span class="value" id="hueVarVal">1.00</span></label>
            <input type="range" id="hueVarSlider" min="0" max="2" step="0.05" value="1">
        </div>
        <div class="control-group" id="satGroup">
            <label>Saturation <span class="value" id="satVal">1.00</span></label>
            <input type="range" id="satSlider" min="0" max="1.5" step="0.05" value="1">
        </div>
        <div class="control-group" id="contrastGroup">
            <label>Contrast <span class="value" id="contrastVal">1.00</span></label>
            <input type="range" id="contrastSlider" min="0" max="2" step="0.05" value="1">
        </div>
        <div class="control-group" id="seedGroup">
            <label>Seed
                <label class="checkbox-group" style="font-size:11px;gap:4px">
                    <input type="checkbox" id="seedLockCheck"> Lock
                </label>
            </label>
            <input type="number" id="seedInput" min="0" max="999999" value="0" style="width:100%;padding:8px 10px;background:#333;color:#ccc;border:1px solid #555;border-radius:4px;font-size:13px;font-family:monospace">
        </div>
        <div class="control-group file-input-wrapper" id="patternUploadGroup">
            <button>Upload Pattern...</button>
            <input type="file" id="patternInput" accept="image/*">
        </div>

        <div class="separator"></div>
        <h2>Output</h2>

        <div class="control-group">
            <label>Resolution</label>
            <select id="resolutionSelect">
                <option value="1280x720" selected>1280 x 720</option>
                <option value="1920x1080">1920 x 1080</option>
                <option value="2560x1440">2560 x 1440</option>
                <option value="3840x2160">3840 x 2160</option>
            </select>
        </div>

        <div class="separator"></div>
        <h2>Actions</h2>
        <button id="fullscreenBtn">Fullscreen</button>
        <button id="regenerateBtn">Regenerate</button>
        <button id="saveBtn">Save Image</button>
        <button id="resetBtn">Reset Defaults</button>
        <button onclick="window.open('https://github.com/KilledByAPixel/stereogram','_blank')">View on GitHub</button>
    </div>

    <div class="canvas-area" id="canvasArea">
        <div class="canvas-wrapper">
            <canvas id="mainCanvas"></canvas>
            <canvas id="depthCanvas"></canvas>
            <div class="drop-overlay" id="dropOverlay">Drop depth map image here</div>
        </div>
        <div class="progress-bar"><div class="fill" id="progressFill"></div></div>
        <div class="progress-text" id="progressText"></div>
    </div>
</div>

<script type="module" src="stereogram.js"></script>
</body>
</html>
