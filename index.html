<!DOCTYPE html>
<html>
<head>
<meta charset=utf-8>
<title>Stereogram Generator</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; font-family: system-ui, -apple-system, sans-serif; background: #1a1a1a; color: #ccc; }

.app {
    display: flex;
    height: 100vh;
    overflow: hidden;
}

/* Sidebar */
.sidebar {
    width: 280px;
    min-width: 280px;
    background: #242424;
    border-right: 1px solid #333;
    overflow-y: auto;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 12px;
}
.sidebar h1 {
    font-size: 16px;
    color: #eee;
    margin-bottom: 4px;
}
.sidebar h2 {
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: #888;
    margin-top: 8px;
}
.control-group {
    display: flex;
    flex-direction: column;
    gap: 2px;
}
.control-group label {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 13px;
    color: #bbb;
}
.control-group label span.value {
    font-family: monospace;
    font-size: 12px;
    color: #999;
    min-width: 40px;
    text-align: right;
}
.control-group input[type="range"] {
    width: 100%;
    height: 6px;
    -webkit-appearance: none;
    appearance: none;
    background: #444;
    border-radius: 3px;
    outline: none;
    cursor: pointer;
}
.control-group input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 14px;
    height: 14px;
    border-radius: 50%;
    background: #7af;
    cursor: pointer;
}
.checkbox-group {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 13px;
    color: #bbb;
    cursor: pointer;
}
.checkbox-group input { cursor: pointer; }

select, button {
    width: 100%;
    padding: 8px 10px;
    background: #333;
    color: #ccc;
    border: 1px solid #555;
    border-radius: 4px;
    font-size: 13px;
    cursor: pointer;
}
select:hover, button:hover { border-color: #7af; }
button { background: #2a3a4a; }
button:hover { background: #3a4a5a; }

.file-input-wrapper {
    position: relative;
}
.file-input-wrapper input[type="file"] {
    position: absolute;
    inset: 0;
    opacity: 0;
    cursor: pointer;
}

.separator { border-top: 1px solid #333; margin: 4px 0; }

/* Canvas area */
.canvas-area {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
    padding: 20px;
}
.canvas-wrapper {
    position: relative;
    max-width: 100%;
    max-height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
}
#mainCanvas {
    max-width: 100%;
    max-height: calc(100vh - 80px);
    box-shadow: 0 0 40px 10px #000;
    object-fit: contain;
}
.drop-overlay {
    position: absolute;
    inset: 0;
    background: rgba(100, 170, 255, 0.15);
    border: 3px dashed #7af;
    border-radius: 8px;
    display: none;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    color: #7af;
    pointer-events: none;
    z-index: 10;
}
.drop-overlay.active { display: flex; }

.progress-bar {
    width: 100%;
    max-width: 600px;
    height: 4px;
    background: #333;
    border-radius: 2px;
    margin-top: 12px;
    overflow: hidden;
}
.progress-bar .fill {
    height: 100%;
    background: #7af;
    width: 0%;
    transition: width 0.1s;
}
.progress-text {
    font-size: 12px;
    color: #666;
    margin-top: 4px;
}

/* Responsive */
@media (max-width: 768px) {
    .app { flex-direction: column; }
    .sidebar {
        width: 100%;
        min-width: unset;
        max-height: 40vh;
        border-right: none;
        border-bottom: 1px solid #333;
    }
}
</style>
</head>
<body>
<div class="app">
    <div class="sidebar">
        <h1>Stereogram Generator</h1>

        <h2>Image</h2>
        <div class="control-group">
            <label>Preset</label>
            <select id="presetSelect">
                <option value="test1.png">test1.png</option>
                <option value="test2.png">test2.png</option>
                <option value="test3.png">test3.png</option>
            </select>
        </div>
        <div class="control-group file-input-wrapper">
            <button id="fileBtn">Upload Image...</button>
            <input type="file" id="fileInput" accept="image/*">
        </div>

        <div class="separator"></div>
        <h2>Stereogram</h2>

        <div class="control-group">
            <label>Depth Intensity <span class="value" id="depthVal">0.30</span></label>
            <input type="range" id="depthSlider" min="0" max="1" step="0.01" value="0.3">
        </div>
        <div class="control-group">
            <label>Repeat Size <span class="value" id="repeatVal">120</span></label>
            <input type="range" id="repeatSlider" min="40" max="300" step="1" value="120">
        </div>
        <div class="control-group">
            <label>Extra Depth <span class="value" id="extraDepthVal">0.00</span></label>
            <input type="range" id="extraDepthSlider" min="0" max="1" step="0.01" value="0">
        </div>

        <div class="separator"></div>
        <h2>Pattern</h2>

        <div class="control-group">
            <label>Texture Scale X <span class="value" id="scaleXVal">4.0</span></label>
            <input type="range" id="scaleXSlider" min="1" max="20" step="0.5" value="4">
        </div>
        <div class="control-group">
            <label>Texture Scale Y <span class="value" id="scaleYVal">4.0</span></label>
            <input type="range" id="scaleYSlider" min="1" max="20" step="0.5" value="4">
        </div>
        <label class="checkbox-group">
            <input type="checkbox" id="pixelateCheck"> Pixelate
        </label>

        <div class="separator"></div>
        <h2>View</h2>
        <label class="checkbox-group">
            <input type="checkbox" id="showHeightCheck"> Show Depth Map
        </label>

        <div class="separator"></div>
        <h2>Actions</h2>
        <button id="regenerateBtn">Regenerate</button>
        <button id="saveBtn">Save Image</button>
        <button id="resetBtn">Reset Defaults</button>
    </div>

    <div class="canvas-area" id="canvasArea">
        <div class="canvas-wrapper">
            <canvas id="mainCanvas"></canvas>
            <div class="drop-overlay" id="dropOverlay">Drop depth map image here</div>
        </div>
        <div class="progress-bar"><div class="fill" id="progressFill"></div></div>
        <div class="progress-text" id="progressText"></div>
    </div>
</div>

<script src="stereogram.js"></script>
</body>
</html>
